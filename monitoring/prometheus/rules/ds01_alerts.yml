# DS01 Alert Rules
# Prometheus alerting rules for GPU waste, system health, and resource limits

groups:
  # GPU-related alerts
  - name: ds01_gpu_alerts
    interval: 30s
    rules:
      # GPU waste detection - allocated but idle
      # Uses recording rule ds01:gpu_utilization_by_slot (DCGM-backed, supports MIG)
      - alert: DS01GPUWaste
        expr: |
          (ds01_gpu_allocated == 1)
          and on(gpu_slot) (ds01:gpu_utilization_by_slot < 5)
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Allocated GPU is idle"
          description: "GPU {{ $labels.gpu_slot }} allocated to {{ $labels.container }} ({{ $labels.user }}) has <5% utilization for 30m"

      # High GPU temperature
      - alert: DS01GPUHighTemperature
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.gpu }} temperature above 85C"
          description: "GPU {{ $labels.gpu }} ({{ $labels.modelName }}) at {{ $value }}C"

      # Critical GPU temperature
      - alert: DS01GPUCriticalTemperature
        expr: DCGM_FI_DEV_GPU_TEMP > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "GPU {{ $labels.gpu }} temperature critical (>90C)"
          description: "GPU {{ $labels.gpu }} ({{ $labels.modelName }}) at {{ $value }}C - thermal throttling likely"

      # High GPU memory usage (uses DCGM framebuffer metrics)
      - alert: DS01GPUMemoryHigh
        expr: |
          (DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)) > 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory usage above 95%"
          description: "GPU {{ $labels.gpu }} memory at {{ $value | humanizePercentage }}"

  # Container alerts (uses cAdvisor metrics from Plan 01)
  - name: ds01_container_alerts
    interval: 30s
    rules:
      # Container high CPU (cAdvisor: rate of CPU seconds × 100 = percent; 400% = 4 cores)
      - alert: DS01ContainerHighCPU
        expr: |
          sum by (name) (rate(container_cpu_usage_seconds_total{name=~".+"}[5m])) * 100 > 400
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Container high CPU usage"
          description: "{{ $labels.name }} using >400% CPU for 30m"

      # Container high memory (cAdvisor; excludes containers with no memory limit set)
      - alert: DS01ContainerHighMemory
        expr: |
          (
            container_memory_usage_bytes{name=~".+"}
            / container_spec_memory_limit_bytes{name=~".+"}
          ) > 0.9
          and container_spec_memory_limit_bytes{name=~".+"} > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Container near memory limit"
          description: "{{ $labels.name }} using {{ $value | humanizePercentage }} of memory limit"

  # System health alerts
  - name: ds01_system_alerts
    interval: 30s
    rules:
      # DS01 exporter down
      - alert: DS01ExporterDown
        expr: up{job="ds01-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DS01 exporter is down"
          description: "DS01 metrics exporter is not responding"

      # Node exporter down
      - alert: DS01NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter is down"
          description: "System metrics are not being collected"

      # cAdvisor down (added in Plan 01)
      - alert: DS01CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cAdvisor is down"
          description: "Per-container metrics are not being collected"

      # DS01 state directory disk space
      - alert: DS01DiskSpaceLow
        expr: (ds01_state_disk_bytes{type="free"} / ds01_state_disk_bytes{type="total"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DS01 state directory low on space"
          description: "Less than 10% disk space remaining"

      # Root filesystem low space (Docker named volumes live on root filesystem)
      - alert: DS01PrometheusStorageLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus storage low"
          description: "Root filesystem (where Docker volumes reside) has less than 10% free space"

      # General disk space warning at 15% threshold
      - alert: DS01HighDiskUsage
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Root filesystem below 15% free space"
          description: "{{ $value | humanizePercentage }} available on root filesystem"

      # High system load
      - alert: DS01HighSystemLoad
        expr: node_load15 > (count(node_cpu_seconds_total{mode="idle"}) * 0.8)
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High system load"
          description: "15-minute load average is high: {{ $value }}"

      # Low available memory
      - alert: DS01LowMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low available memory"
          description: "Less than 10% memory available"

      # MIG topology mismatch (nvidia-smi vs DCGM)
      # Fires when MIG partitions change but DCGM hasn't been restarted.
      # Gated on MIG actually existing (count(ds01_mig_slot_info) > 0) so a
      # no-MIG box — where mapping_status may be 0 simply because there is
      # nothing to map — does not raise a spurious mismatch alert.
      - alert: DS01MIGMappingMismatch
        expr: ds01_mig_mapping_status == 0 and on() (count(ds01_mig_slot_info) > 0)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MIG topology mismatch detected"
          description: "MIG slot mapping shows {{ $labels.unmapped }} unmapped instances. DCGM exporter may need restart after partition change."

      # DCGM exporter down
      - alert: DS01DCGMExporterDown
        expr: up{job="dcgm-exporter"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DCGM exporter is down"
          description: "GPU hardware metrics are not being collected"

      # Grafana down (scrape job added in Plan 01)
      - alert: DS01GrafanaDown
        expr: up{job="grafana"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Grafana is down"
          description: "Dashboard UI is not responding"

      # Alertmanager down (scrape job added in Plan 01)
      - alert: DS01AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is down"
          description: "Alert routing and notifications are not functioning"

      # GPU XID errors (hardware errors)
      # DCGM_FI_DEV_XID_ERRORS is the last XID error CODE (it latches and stays
      # set), not a count — so `> 0` would fire forever after any past error.
      # Fire on a CHANGE in the code over the last 10m to catch new XID events.
      - alert: DS01GPUXIDError
        expr: changes(DCGM_FI_DEV_XID_ERRORS[10m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GPU XID error detected"
          description: "GPU {{ $labels.gpu }} reported a new XID error code {{ $value }}"

  # User-specific alerts (using recording rules)
  - name: ds01_user_alerts
    interval: 30s
    rules:
      # User has GPUs with very low utilization
      # Gated on DCGM being up: if dcgm-exporter is down, utilization reads as 0
      # and would otherwise raise false "0% util" waste alerts. The phantom {}
      # series is also gone now that ds01:user_gpu_utilization_avg dropped its
      # `or vector(0)` fallback, so this only fires for real users.
      - alert: DS01UserGPUWaste
        expr: |
          ds01:user_gpu_utilization_avg < 5
          and on() (up{job="dcgm-exporter"} == 1)
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "User {{ $labels.user }} has low GPU utilization"
          description: "User {{ $labels.user }} has avg GPU utilization of {{ $value | printf \"%.1f\" }}% for 2+ hours. Consider releasing unused GPUs."

      # High GPU waste across system (>50% of allocated GPUs idle)
      # Guard: only fire when more than 3 GPUs are allocated, so a single idle
      # allocation (1/1 = 100%) on a lightly-used box does not raise a "high
      # waste" alert. With >3 allocations a >50% idle share is genuinely wasteful.
      - alert: DS01SystemHighGPUWaste
        expr: |
          ds01:gpu_waste_percent > 50
          and on() (count(ds01_gpu_allocated) > 3)
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High GPU waste across system"
          description: "{{ $value | printf \"%.0f\" }}% of allocated GPUs have <5% utilization"

      # DS01UserNearMIGLimit removed: it referenced ds01_user_max_mig_instances,
      # a per-user quota metric that is NOT emitted by any exporter, so the alert
      # could never fire (dead rule). Reinstate once a per-user GPU quota metric
      # (e.g. ds01_user_max_mig_instances or ds01_user_gpu_quota) is exported.

  # Capacity planning alerts
  - name: ds01_capacity_alerts
    interval: 5m
    rules:
      # Low GPU capacity (system running low on free GPU compute)
      # Repointed to the fractional GPU-equivalents (gpueq) family: a full GPU
      # contributes 1.0 and a MIG instance its compute fraction, so this tracks
      # how much real GPU COMPUTE is free rather than how many allocatable units
      # remain (the slot-count family still backs the "how many units" panels).
      # Fires when less than 20% of total GPU compute is free.
      # NOTE: ds01_gpu_equivalents is emitted by exporter PR #75 and is not live
      # yet, so _allocated is currently empty and _free == _total (= 4); this
      # stays quiet until #75 deploys.
      - alert: DS01LowGPUCapacity
        expr: (ds01:system_gpu_equivalents_free / ds01:system_gpu_equivalents_total) < 0.2
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Low GPU capacity available"
          description: "Only {{ $value | humanizePercentage }} of GPU compute (GPU-equivalents) is free"

      # Critically low GPU capacity
      # Repointed to ds01:system_gpu_equivalents_free for the same reason: fewer
      # than 1.0 GPU-equivalents free means there is effectively no spare GPU
      # compute, even if some MIG slots remain allocatable.
      # See the PR #75 note above — quiet until the exporter lands.
      - alert: DS01CriticalGPUCapacity
        expr: ds01:system_gpu_equivalents_free < 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Critical: Very little GPU capacity available"
          description: "Only {{ $value }} GPU-equivalents free. Users may be unable to get GPU compute."
