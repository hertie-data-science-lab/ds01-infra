# Grafana Dashboard Provisioning
# Auto-loads dashboards from JSON files

apiVersion: 1

providers:
  - name: 'DS01 Dashboards'
    orgId: 1
    folder: 'DS01'
    folderUid: 'ds01'
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    # NOTE: allowUiUpdates is true during Phase 12 dashboard development.
    # Set back to false once Phase 12 is complete to prevent untracked edits.
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/dashboards
