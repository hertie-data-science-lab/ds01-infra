# DS01 Alertmanager Configuration
# Teams-only alerting via msteamsv2_configs
#
# SETUP:
#   The Teams webhook URL is read at runtime from the gitignored secret file
#   config/runtime/teams-webhook-url.txt (mounted read-only into the container at
#   /etc/alertmanager/teams-webhook-url.txt). Put the Power Automate (logic.azure.com)
#   workflow URL in that file — it must never be committed (this repo is public).
#   The same file is the single source of truth for ds01-monthly-report.
#
# NOTE: Requires Alertmanager v0.28.0+ for msteamsv2_configs + webhook_url_file support.
#   Current image: prom/alertmanager:v0.28.1

global:
  resolve_timeout: 5m

# Alert routing tree
route:
  # Default receiver (all alerts go here unless matched by child route)
  receiver: 'ds01-teams'

  # Group alerts by alertname only (aggressive grouping for batch notifications)
  group_by: ['alertname']

  # Wait 5m before sending first notification (batch related alerts)
  group_wait: 5m

  # Wait 5m before sending updates for existing group
  group_interval: 5m

  # Resend notification every 4h if alert still firing
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - faster notification path
    - match:
        severity: critical
      receiver: 'ds01-teams-critical'
      group_wait: 30s      # Send critical alerts quickly
      repeat_interval: 1h  # Remind more frequently

# Inhibition rules - suppress alerts when related critical is firing
inhibit_rules:
  # If critical, suppress warning for same alertname
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

  # If exporter down, suppress all ds01_ alerts
  - source_match:
      alertname: 'DS01ExporterDown'
    target_match_re:
      alertname: 'DS01.*'
    equal: ['job']

# Receivers - Teams-only delivery via msteamsv2_configs
receivers:
  - name: 'ds01-teams'
    msteamsv2_configs:
      - webhook_url_file: '/etc/alertmanager/teams-webhook-url.txt'
        send_resolved: true
        title: '[DS01] {{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
        text: |
          **Severity:** {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          {{ end }}

  - name: 'ds01-teams-critical'
    msteamsv2_configs:
      - webhook_url_file: '/etc/alertmanager/teams-webhook-url.txt'
        send_resolved: true
        title: '[DS01 CRITICAL] {{ .CommonLabels.alertname }}'
        text: |
          **CRITICAL ALERT**
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          {{ end }}
