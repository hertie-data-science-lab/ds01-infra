# DS01 Infrastructure - Project Configuration
# This is NOT a Python package - just configuration for development tools.
# Versioning handled by semantic-release (see .releaserc.json + .github/workflows/release.yml)

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]  # Line length handled separately

[tool.ruff.lint.isort]
known-first-party = ["ds01"]
