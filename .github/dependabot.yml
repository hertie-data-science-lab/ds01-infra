version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
