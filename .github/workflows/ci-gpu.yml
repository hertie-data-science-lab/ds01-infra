name: GPU CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gpu-ci
  cancel-in-progress: true

jobs:
  gpu-tests:
    name: Full test suite (GPU + runtime)
    runs-on: [self-hosted, linux, gpu]
    steps:
      - name: Run runtime tests against live system
        working-directory: /opt/ds01-infra/testing
        run: sudo /home/datasciencelab/anaconda3/bin/python -m pytest . -m "runtime" -v --tb=short
