name: Sync Documentation to ds01-hub

on:
  push:
    branches:
      - main
    paths:
      - 'docs-user/**'
      - '!docs-user/internal/**'

  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo (ds01-infra)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: source

      - name: Checkout target repo (ds01-hub)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: hertie-data-science-lab/ds01-hub
          ssh-key: ${{ secrets.DOCS_DEPLOY_KEY }}
          path: target

      - name: Sync documentation
        run: |
          # Mirror ALL of docs-user/ into the hub's docs/ (excluding any
          # internal-only subtree). Using rsync --delete keeps the target an
          # exact mirror and avoids the drift the old hand-listed copy caused
          # (e.g. silently dropping newly-added top-level files).
          mkdir -p target/docs/
          rsync -a --delete --exclude 'internal' source/docs-user/ target/docs/

      - name: Check for changes
        id: changes
        working-directory: target
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: target
        run: |
          git config user.name "henrycgbaker"
          git config user.email "henry.c.g.baker@gmail.com"
          git commit -m "docs: sync from ds01-infra

          Source: ${{ github.sha }}"
          git push
