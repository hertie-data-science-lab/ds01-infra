name: Deploy

# Tag-gated release of the live runtime via ds01-sync (staging clone + rsync).
# Fires on a vX.Y.Z tag push, or manual dispatch. The self-hosted runner (which
# must run as datasciencelab) invokes ds01-sync, which builds + smoke-tests in
# /opt/ds01-staging before publishing to /opt/ds01-infra and auto-rolls-back on
# failure.
#
# Controls (defence in depth):
#   - restrict v* tag creation to admins via a GitHub ruleset
#   - the 'production' environment below can require a reviewer (one-click gate)
#   - narrow sudoers (config/deploy/sudoers.d/ds01-sync-runner): ds01-sync only
#   - ds01-sync validates the --ref format and ancestry of origin/main

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.5.0)'
        required: true

concurrency:
  group: ds01-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Release to prod via ds01-sync
    runs-on: [self-hosted, linux, gpu]
    # Optional one-click human gate: configure the 'production' environment in
    # repo settings with a required reviewer. Harmless if left unconfigured.
    environment: production
    steps:
      - name: Resolve + validate tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Release via ds01-sync
        run: sudo /usr/local/bin/ds01-sync --ref "${{ steps.tag.outputs.tag }}"
