name: Fast CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Symlink to /opt/ds01-infra for hardcoded test paths
        run: sudo ln -s "$GITHUB_WORKSPACE" /opt/ds01-infra

      - name: Setup Python 3.13
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run unit tests
        working-directory: /opt/ds01-infra/testing
        run: pytest . -m "not system" -v --tb=short

  shellcheck:
    name: Shellcheck (differential)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Differential ShellCheck
        uses: redhat-plumbers-in-action/differential-shellcheck@d965e66ec0b3b2f821f75c8eff9b12442d9a7d1e  # v5.5.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
