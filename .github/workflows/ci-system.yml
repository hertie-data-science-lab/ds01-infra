name: System CI

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-system
  cancel-in-progress: true

jobs:
  system-tests:
    name: Full test suite (GPU + system)
    runs-on: [self-hosted, linux, gpu]
    steps:
      - name: Run full test suite on live system
        working-directory: /opt/ds01-infra/testing
        run: sudo /home/datasciencelab/anaconda3/bin/python -m pytest . -v --tb=short

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --repo "${{ github.repository }}" --label "bug" \
            --search "System CI failed" --state open --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" \
              --body "Still failing: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "System CI failed ($(date -u +%Y-%m-%d))" \
              --body "Nightly system CI failed on $(date -u).

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the test logs for details." \
              --label "bug"
          fi
