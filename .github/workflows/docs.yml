name: Build docs site

# Builds the Docusaurus full documentation site under website/ and deploys to
# this repo's own GitHub Pages on push to main. PR runs build-only (no deploy)
# as an authoritative correctness gate (onBrokenLinks: 'throw'), independent of
# the Cloudflare Pages preview surface (see docs-admin/preview-deployments.md).
#
# Production URL: https://hertie-data-science-lab.github.io/ds01-infra/
# The public end-user subset is a separate site built in ds01-hub (→ /ds01/).

on:
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "docs-user/**"
      - "docs-admin/**"
      - "docs-develop/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs-user/**"
      - "docs-admin/**"
      - "docs-develop/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        working-directory: website
        run: npm ci
      - name: Build site
        working-directory: website
        run: npm run build
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy docs site
    # PR runs are build-only (correctness gate). Deploy fires on push to main
    # and manual dispatch.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
